<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>👑 Boss Babe Generator PRO</title>

<style>
body{
font-family:Arial;
background:#fafafa;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#ff4f9a;
}

.section{margin-top:20px;}

.tags{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.tag{
padding:8px 14px;
border-radius:20px;
background:#f3f3f3;
cursor:pointer;
}

.tag.active{
background:#ff4f9a;
color:#fff;
}

button{
margin-top:10px;
width:100%;
padding:14px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
border:none;
border-radius:14px;
cursor:pointer;
}

.result{
margin-top:15px;
padding:15px;
background:#fff0f8;
border-radius:12px;
min-height:100px;
white-space:pre-line;
}

.lock{
background:#fff0f0;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator</h1>
<div style="text-align:center;">Generated: <span id="count">0</span></div>

<div class="lock" id="lockBox" style="display:none;">
💎 Upgrade to PRO for unlimited generations
<button onclick="goToCheckout()">Unlock PRO</button>
</div>

<!-- STYLE -->
<div class="section">
<h3>STYLE</h3>
<div class="tags" data-group="style">
<div class="tag">chibi</div>
<div class="tag">anime</div>
<div class="tag">pixar 3d</div>
<div class="tag">digital art</div>
<div class="tag">watercolor</div>
</div>
</div>

<!-- OUTFIT -->
<div class="section">
<h3>OUTFIT</h3>
<div class="tags" data-group="outfit">
<div class="tag">oversized t-shirt</div>
<div class="tag">hoodie and sweatpants</div>
<div class="tag">tracksuit</div>
<div class="tag">leather jacket with ripped jeans</div>
<div class="tag">chanel outfit</div>
<div class="tag">louis vuitton outfit</div>
</div>
</div>

<!-- SHOES -->
<div class="section">
<h3>SHOES</h3>
<div class="tags" data-group="shoes">
<div class="tag">vans sneakers</div>
<div class="tag">nike sneakers</div>
<div class="tag">heels</div>
</div>
</div>

<button onclick="generate()">✨ Generate Prompt</button>

<button onclick="copyPrompt()">📋 Copy</button>
<button onclick="downloadPrompt()">⬇️ Download</button>

<div id="result" class="result"></div>

</div>

<script>

let total = 0;
let isPro = localStorage.getItem("bb_pro") === "true";

// check stripe return
const params = new URLSearchParams(window.location.search);
if(params.get("paid") === "true"){
localStorage.setItem("bb_pro","true");
isPro = true;
}

// toggle tags
document.querySelectorAll(".tag").forEach(tag=>{
tag.onclick=()=>tag.classList.toggle("active");
});

function getGroup(name){
let tags=document.querySelectorAll(`[data-group="${name}"] .active`);
return [...tags].map(t=>t.innerText).join(", ");
}

function generate(){

if(!isPro && total >= 5){
document.getElementById("lockBox").style.display="block";
return;
}

let prompt = `
${getGroup("style")},
wearing ${getGroup("outfit")} with ${getGroup("shoes")},
ultra aesthetic, cinematic lighting, 4k.
`;

document.getElementById("result").innerText = prompt;

total++;
document.getElementById("count").innerText = total;

}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("result").innerText);
}

// DOWNLOAD FEATURE
function downloadPrompt(){
let text = document.getElementById("result").innerText;
let blob = new Blob([text], {type: "text/plain"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "prompt.txt";
a.click();
}

// STRIPE CHECKOUT
function goToCheckout(){
let returnUrl = window.location.href + "?paid=true";
window.location.href = "https://buy.stripe.com/YOUR_LINK_HERE?success_url=" + encodeURIComponent(returnUrl);
}

</script>

</body>
</html>
