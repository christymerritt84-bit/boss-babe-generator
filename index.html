<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator 11.0</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#fff0f8,#fff);
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

h1{color:#ff4f9a;}

.tabs{
display:flex;
gap:10px;
margin:20px 0;
}

.tab{
flex:1;
padding:14px;
border:none;
border-radius:20px;
background:#f3d6e6;
color:#ff4f9a;
font-weight:bold;
cursor:pointer;
}

.tab.active{
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
}

.tabContent{display:none;}
.tabContent.active{display:block;}

.section{margin-top:15px;}

select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #eee;
margin-top:6px;
}

button{
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.result{
margin-top:20px;
padding:20px;
background:#fff0f8;
border-radius:16px;
min-height:140px;
white-space:pre-line;
}

.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator 11.0</h1>

<div class="tabs">
<button class="tab active" onclick="showTab('prompts', this)">Prompts</button>
<button class="tab" onclick="showTab('characters', this)">Characters</button>
<button class="tab" onclick="showTab('typography', this)">Typography</button>
</div>

<div class="row">

<div>

<!-- PROMPTS TAB -->
<div id="prompts" class="tabContent active">

<select id="gender"><option>Woman</option><option>Man</option></select>
<select id="age"><option>Young adult</option><option>Teen</option><option>Adult</option></select>
<select id="ethnicity"><option>Black</option><option>Latina</option><option>White</option><option>Asian</option></select>
<select id="hair"><option>Long straight hair</option><option>Curly hair</option></select>
<select id="makeup"><option>Soft glam makeup</option><option>Full glam makeup</option></select>

<select id="style">
<option>Luxury diva</option>
<option>Streetwear</option>
<option>Chibi style</option>
<option>Anime style</option>
<option>Bratz doll style</option>
</select>

<select id="outfit"><option>Mini dress</option><option>Streetwear fit</option></select>
<select id="footwear"><option>Heels</option><option>Nike sneakers</option></select>
<select id="lighting"><option>Golden hour</option><option>Studio lighting</option></select>

<button onclick="generate()">✨ Generate Prompt</button>
<div id="result" class="result"></div>

</div>

<!-- CHARACTERS TAB -->
<div id="characters" class="tabContent">

<h3>👤 Character Generator</h3>

<select id="charStyle">
<option>Realistic</option>
<option>Chibi</option>
<option>Anime</option>
<option>Bratz doll</option>
</select>

<select id="charType">
<option>Boss Babe</option>
<option>Influencer</option>
<option>Model</option>
</select>

<select id="body">
<option>Slim</option>
<option>Curvy</option>
<option>Petite</option>
</select>

<select id="expression">
<option>Confident smirk</option>
<option>Soft smile</option>
<option>Serious face</option>
</select>

<select id="energy">
<option>Boss energy</option>
<option>Soft feminine</option>
<option>Luxury lifestyle</option>
</select>

<button onclick="generateCharacter()">✨ Generate Character</button>

<div id="charResult" class="result"></div>

</div>

<!-- TYPOGRAPHY -->
<div id="typography" class="tabContent">
<h3>🔤 Typography (Coming Next)</h3>
</div>

</div>

<div>
<h3>💎 Pro</h3>
<button onclick="goToCheckout()">Upgrade</button>
<div id="count">Generated: 0</div>
</div>

</div>

</div>

<script>

let total=0;

const params=new URLSearchParams(window.location.search);
if(params.get('paid')==='true'){
localStorage.setItem("bb_pro","true");
}

let isPro=localStorage.getItem("bb_pro")==="true";

function val(id){ return document.getElementById(id).value; }

function showTab(tabId, btn){
document.querySelectorAll(".tabContent").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(tabId).classList.add("active");
btn.classList.add("active");
}

// PROMPT GENERATOR
function generate(){

if(!isPro && total>=10){
alert("Upgrade to Pro 💎");
goToCheckout();
return;
}

let style=val("style");

let quality="ultra realistic, cinematic, 4k";

if(style.includes("Chibi")||style.includes("Anime")||style.includes("Bratz")){
quality="stylized illustration, vibrant colors, digital art";
}

let prompt=`A ${val("age")} ${val("ethnicity")} ${val("gender")} with ${val("hair")}, styled in ${style}, wearing ${val("outfit")}, ${val("lighting")}, ${quality}`;

document.getElementById("result").innerText=prompt;

total++;
document.getElementById("count").innerText="Generated: "+total;
}

// CHARACTER GENERATOR (REAL STYLE SWITCH)
function generateCharacter(){

let style=val("charStyle");
let base=`A ${val("body")} ${val("charType")} with ${val("expression")}, ${val("energy")}`;

let output="";

// DIFFERENT STYLE OUTPUTS
if(style==="Realistic"){
output=`${base}, ultra realistic portrait, cinematic lighting, high detail, 4k photography`;
}

if(style==="Chibi"){
output=`Cute chibi character, big head small body proportions, ${base}, vibrant colors, kawaii aesthetic, digital illustration`;
}

if(style==="Anime"){
output=`Anime style character, expressive eyes, detailed shading, ${base}, vibrant anime aesthetic, high detail illustration`;
}

if(style==="Bratz doll"){
output=`Bratz doll style character, large eyes, glossy lips, dramatic makeup, ${base}, fashion doll aesthetic, high detail`;
}

document.getElementById("charResult").innerText=output;
}

function goToCheckout(){
const returnUrl=window.location.href+"?paid=true";
window.location.href="https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00?success_url="+encodeURIComponent(returnUrl);
}

</script>

</body>
</html>
