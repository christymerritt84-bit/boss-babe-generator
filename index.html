<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator 9.0</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#fff0f8,#fff);
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

h1{color:#ff4f9a;}

.section{margin-top:15px;}

select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #eee;
margin-top:6px;
font-size:14px;
}

button{
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.result{
margin-top:20px;
padding:20px;
background:#fff0f8;
border-radius:16px;
min-height:140px;
white-space:pre-line;
}

.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator 9.0</h1>
<p>Luxury AI prompt studio</p>

<div class="row">

<div>

<div class="section">
<h3>👤 Gender</h3>
<select id="gender">
<option>Woman</option>
<option>Man</option>
</select>
</div>

<div class="section">
<h3>🎂 Age</h3>
<select id="age">
<option>Teen</option>
<option>Young adult</option>
<option>Adult</option>
</select>
</div>

<div class="section">
<h3>🌍 Ethnicity</h3>
<select id="ethnicity">
<option>Black</option>
<option>Latina</option>
<option>White</option>
<option>Asian</option>
<option>Mixed</option>
</select>
</div>

<div class="section">
<h3>💇 Hair</h3>
<select id="hair">
<option>Long straight hair</option>
<option>Curly hair</option>
<option>Sleek ponytail</option>
<option>Messy bun</option>
<option>Blonde hair</option>
<option>Black hair</option>
<option>Colored hair</option>
</select>
</div>

<div class="section">
<h3>💄 Makeup</h3>
<select id="makeup">
<option>Soft glam makeup</option>
<option>Full glam makeup</option>
<option>Natural makeup</option>
<option>No makeup look</option>
<option>Glossy lips</option>
<option>Matte makeup</option>
<option>Bold eye makeup</option>
<option>Bronzed glow</option>
</select>
</div>

<div class="section">
<h3>✨ Style</h3>
<select id="style">
<option>Luxury diva</option>
<option>Soft glam</option>
<option>Streetwear</option>
<option>High fashion</option>
</select>
</div>

<div class="section">
<h3>👗 Outfit</h3>
<select id="outfit">
<option>Mini dress</option>
<option>Designer outfit</option>
<option>Streetwear fit</option>
<option>Athleisure outfit</option>
</select>
</div>

<div class="section">
<h3>👟 Footwear</h3>
<select id="footwear">
<option>Heels</option>
<option>Designer sneakers</option>
<option>Nike sneakers</option>
<option>Chunky sneakers</option>
</select>
</div>

<div class="section">
<h3>👜 Accessories</h3>
<select id="accessories">
<option>Luxury handbag</option>
<option>Designer sunglasses</option>
<option>Gold jewelry</option>
<option>Diamond jewelry</option>
<option>None</option>
</select>
</div>

<div class="section">
<h3>🧍 Pose</h3>
<select id="pose">
<option>Standing confidently</option>
<option>Walking forward</option>
<option>Sitting elegantly</option>
<option>Looking over shoulder</option>
</select>
</div>

<div class="section">
<h3>💡 Lighting</h3>
<select id="lighting">
<option>Golden hour lighting</option>
<option>Studio lighting</option>
<option>Neon glow</option>
<option>Soft lighting</option>
</select>
</div>

<div class="section">
<h3>🌆 Scene</h3>
<select id="scene">
<option>Luxury penthouse</option>
<option>City streets</option>
<option>Beach sunset</option>
<option>Luxury boutique</option>
<option>Studio background</option>
</select>
</div>

<div class="section">
<h3>💅 Vibe</h3>
<select id="vibe">
<option>Boss energy</option>
<option>Confident energy</option>
<option>Luxury lifestyle</option>
<option>Soft feminine vibe</option>
</select>
</div>

<input id="custom" placeholder="Add extra details..." style="width:100%;padding:12px;border-radius:12px;border:1px solid #eee;margin-top:15px;">

<button onclick="generate()">✨ Generate Prompt</button>

<div id="result" class="result"></div>

</div>

<div>
<h3>💎 Pro</h3>
<button onclick="goToCheckout()">Upgrade</button>
<div id="count">Generated: 0</div>
</div>

</div>

</div>

<script>

let total=0;

const params=new URLSearchParams(window.location.search);
if(params.get('paid')==='true'){
localStorage.setItem("bb_pro","true");
}

let isPro=localStorage.getItem("bb_pro")==="true";

function val(id){
return document.getElementById(id).value;
}

function generate(){

if(!isPro && total>=10){
alert("Upgrade to Pro 💎");
goToCheckout();
return;
}

let prompt = `A highly detailed ${val("age")} ${val("ethnicity")} ${val("gender")} with ${val("hair")}, styled in ${val("style")}, wearing a ${val("outfit")} paired with ${val("footwear")}, accessorized with ${val("accessories")}, featuring ${val("makeup")}, ${val("pose")}, set in ${val("scene")}, captured with ${val("lighting")}, ${val("vibe")}, ultra realistic, cinematic lighting, 4k, high detail, trending aesthetic, professional photography style`;

let custom=document.getElementById("custom").value;

if(custom){
prompt += ", " + custom;
}

document.getElementById("result").innerText=prompt;

total++;
document.getElementById("count").innerText="Generated: "+total;
}

function goToCheckout(){
const returnUrl=window.location.href+"?paid=true";
window.location.href="https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00?success_url="+encodeURIComponent(returnUrl);
}

</script>

</body>
</html>
