<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>👑 Boss Babe Generator</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#fff0f8);
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,.1);
}

h1{
color:#ff4f9a;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#fff;
border-radius:16px;
padding:16px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
}

.card h3{
margin-bottom:10px;
font-size:14px;
letter-spacing:1px;
color:#555;
}

select, input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
margin-top:6px;
}

.toggle{
display:flex;
align-items:center;
margin-top:10px;
gap:6px;
font-size:13px;
}

button{
margin-top:25px;
padding:16px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
border:none;
border-radius:16px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#fff0f8;
border-radius:12px;
min-height:120px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator</h1>
<p style="color:#777;">Luxury AI prompt builder</p>

<div class="grid">

<!-- FACIAL FEATURES -->
<div class="card">
<h3>FACIAL FEATURES</h3>
<select id="features">
<option>freckles</option>
<option>dimples</option>
<option>clear skin</option>
<option>freckles + dimples</option>
</select>
<input id="featuresCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="featuresToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- EYES -->
<div class="card">
<h3>EYES</h3>
<select id="eyes">
<option>big brown eyes</option>
<option>huge exaggerated eyes</option>
<option>blue eyes</option>
<option>hazel eyes</option>
</select>
<input id="eyesCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="eyesToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- LASH -->
<div class="card">
<h3>LASH INTENSITY</h3>
<select id="lashes">
<option>natural lashes</option>
<option>long lashes</option>
<option>ultra dramatic doll lashes</option>
</select>
<input id="lashesCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="lashesToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- LIPS -->
<div class="card">
<h3>LIP STYLE</h3>
<select id="lips">
<option>soft gloss</option>
<option>matte lips</option>
<option>plump lips</option>
</select>
<input id="lipsCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="lipsToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- EXTRA -->
<div class="card">
<h3>EXTRA GLAM</h3>
<select id="extra">
<option>face gems</option>
<option>highlight glow</option>
<option>glass skin</option>
</select>
<input id="extraCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="extraToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- OUTFIT -->
<div class="card">
<h3>OUTFIT</h3>
<select id="outfit">
<option>glam streetwear</option>
<option>mini dress</option>
<option>luxury outfit</option>
<option>oversized hoodie</option>
</select>
<input id="outfitCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="outfitToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- SHOES -->
<div class="card">
<h3>SHOES</h3>
<select id="shoes">
<option>nike sneakers</option>
<option>heels</option>
<option>designer heels</option>
<option>chunky sneakers</option>
</select>
<input id="shoesCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="shoesToggle" checked>
<label>Include in prompt</label>
</div>
</div>

<!-- POSE -->
<div class="card">
<h3>POSE</h3>
<select id="pose">
<option>standing</option>
<option>walking</option>
<option>posing confidently</option>
<option>hand on hip</option>
</select>
<input id="poseCustom" placeholder="Add custom value...">
<div class="toggle">
<input type="checkbox" id="poseToggle" checked>
<label>Include in prompt</label>
</div>
</div>

</div>

<button onclick="generate()">✨ Generate Prompt</button>

<div id="result" class="result"></div>

</div>

<script>

function getValue(id){
let base = document.getElementById(id).value;
let custom = document.getElementById(id+"Custom").value;
let toggle = document.getElementById(id+"Toggle").checked;

if(!toggle) return "";

return custom ? custom : base;
}

function generate(){

let prompt = `
A highly detailed boss babe with ${getValue("features")},
${getValue("eyes")},
${getValue("lashes")},
${getValue("lips")},
${getValue("extra")},
wearing ${getValue("outfit")} with ${getValue("shoes")},
${getValue("pose")},
ultra realistic, cinematic lighting, 4k, high detail.
`;

document.getElementById("result").innerText = prompt;

}

</script>

</body>
</html>
