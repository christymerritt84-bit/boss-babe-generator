<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator Elite</title>

<style>
:root{
--pink:#ff4f9a;
--pink2:#ff7ab8;
--soft:#fff4fa;
--white:#ffffff;
--card:#ffffff;
--text:#333;
--muted:#777;
--purple:#9b59ff;
--dark:#222;
--shadow:0 18px 45px rgba(0,0,0,.10);
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ffbddc,#ffe5f2,#fff7fb);
background-size:300% 300%;
animation:bgmove 10s infinite alternate;
padding:24px;
color:var(--text);
}

@keyframes bgmove{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
max-width:1150px;
margin:auto;
background:rgba(255,255,255,.92);
backdrop-filter:blur(10px);
border-radius:28px;
padding:28px;
box-shadow:var(--shadow);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:18px;
flex-wrap:wrap;
margin-bottom:20px;
}

.brand{
flex:1;
}

h1{
font-size:46px;
color:var(--pink);
margin-bottom:8px;
letter-spacing:-1px;
}

.sub{
font-size:18px;
color:var(--muted);
line-height:1.5;
max-width:650px;
}

.heroBadges{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:16px;
}

.heroBadges span{
background:#fff1f8;
color:var(--pink);
padding:10px 14px;
border-radius:999px;
font-size:14px;
font-weight:bold;
box-shadow:0 8px 18px rgba(255,79,154,.08);
}

.tabs{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.tab{
padding:10px 14px;
border:none;
border-radius:999px;
background:#ffe3f1;
color:var(--pink);
font-weight:bold;
cursor:pointer;
}

.tab.active{
background:linear-gradient(90deg,var(--pink),var(--pink2));
color:#fff;
}

.grid{
display:grid;
grid-template-columns:1.35fr .65fr;
gap:18px;
}

.panel{
background:var(--card);
border-radius:24px;
padding:22px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:12px;
}

select,input,button{
width:100%;
padding:14px;
border-radius:16px;
font-size:16px;
outline:none;
}

select,input{
border:1px solid #eee;
background:#fff;
color:#333;
}

input::placeholder{
color:#555;
opacity:1;
}

select:focus,input:focus{
border-color:var(--pink);
box-shadow:0 0 0 3px rgba(255,79,154,.14);
}

button{
border:none;
cursor:pointer;
font-weight:bold;
color:#fff;
background:linear-gradient(90deg,var(--pink),var(--pink2));
transition:.2s;
}

button:hover{
transform:translateY(-2px);
opacity:.96;
}

.alt{
background:#ffd3e5;
color:#333;
}

.copy{
background:var(--purple);
}

.dark{
background:var(--dark);
}

#result{
margin-top:14px;
padding:20px;
min-height:190px;
border-radius:22px;
background:linear-gradient(135deg,#fff1f8,#fffafd);
line-height:1.8;
font-size:17px;
}

.previewBox{
text-align:center;
}

.previewEmoji{
font-size:100px;
margin:8px 0 14px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

.stat{
background:#fff5fa;
padding:12px;
border-radius:16px;
margin-top:10px;
font-weight:bold;
color:var(--pink);
}

.favs{
margin-top:14px;
max-height:230px;
overflow:auto;
text-align:left;
}

.favItem{
background:#fff5fa;
padding:10px;
border-radius:14px;
margin-bottom:8px;
font-size:14px;
line-height:1.5;
}

.footer{
margin-top:18px;
text-align:center;
color:#888;
font-size:14px;
}

@media(max-width:920px){
.grid{
grid-template-columns:1fr;
}
}

@media(max-width:700px){
.row{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
}

h1{
font-size:34px;
}

.previewEmoji{
font-size:72px;
}

.sub{
font-size:16px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">

<div class="brand">
<h1>👑 Boss Babe Generator</h1>

<div class="sub">
Luxury AI prompt studio for creators, brands & icons.
</div>

<div class="heroBadges">
<span>💖 Free Tool</span>
<span>🔥 Viral Ready</span>
<span>💎 Premium Energy</span>
</div>
</div>

<div class="tabs">
<button class="tab active">Prompts</button>
<button class="tab">Characters</button>
<button class="tab">Typography</button>
</div>

</div>

<div class="grid">

<div class="panel">

<div class="row">
<select id="gender">
<option>Woman</option>
<option>Girl</option>
<option>Man</option>
<option>Boy</option>
</select>

<select id="style">
<option>Luxury Diva</option>
<option>Boss Babe</option>
<option>Soft Princess</option>
<option>Streetwear Icon</option>
<option>Glossy Glam</option>
<option>Dark Edgy</option>
</select>
</div>

<div class="row">
<select id="skin">
<option>Rich Tan Skin</option>
<option>Deep Brown Skin</option>
<option>Fair Glowing Skin</option>
<option>Golden Skin Tone</option>
</select>

<select id="hair">
<option>Long Black Waves</option>
<option>Pink Ponytail</option>
<option>Brown Bob</option>
<option>Blonde Pixie Cut</option>
</select>
</div>

<div class="row">
<select id="eyes">
<option>Huge Brown Eyes</option>
<option>Glossy Hazel Eyes</option>
<option>Sparkling Blue Eyes</option>
</select>

<select id="body">
<option>Petite</option>
<option>Curvy</option>
<option>Slim</option>
<option>Athletic</option>
</select>
</div>

<div class="row">
<input list="makeupList" id="makeup" placeholder="Choose Makeup Style">

<datalist id="makeupList">
<option value="Soft Glam">
<option value="Full Beat">
<option value="Natural Glow">
<option value="Barbie Pink Glam">
</datalist>

<input list="nailsList" id="nails" placeholder="Choose Nail Style">

<datalist id="nailsList">
<option value="French Tips">
<option value="Diamond Nails">
<option value="Chrome Nails">
<option value="Long Pink Stilettos">
</datalist>
</div>

<div class="row">
<button onclick="generate()">✨ Generate</button>
<button class="alt" onclick="randomize()">🎲 Randomize</button>
</div>

<div class="row">
<button class="copy" onclick="copyPrompt()">📋 Copy</button>
<button class="dark" onclick="saveFav()">💾 Save Favorite</button>
</div>

<div id="result">Your boss babe prompt appears here...</div>

</div>

<div class="panel previewBox">

<div class="previewEmoji" id="emoji">💖</div>

<div class="stat" id="count">Prompts Generated: 0</div>
<div class="stat">Theme: Luxury Pink</div>

<div class="favs" id="favorites">
<div class="favItem">Saved favorites appear here.</div>
</div>

</div>

</div>

<div class="footer">
Built for creators who want pretty tools that win.
</div>

</div>

<script>
let total = 0;

function val(id){
return document.getElementById(id).value;
}

function generate(){

let prompt = `A ${val("style").toLowerCase()} exaggerated chibi-style ${val("gender").toLowerCase()} with ${val("skin").toLowerCase()}, ${val("eyes").toLowerCase()}, ${val("hair").toLowerCase()}, wearing ${val("makeup").toLowerCase()} makeup and ${val("nails").toLowerCase()}, with a ${val("body").toLowerCase()} body type, glossy finish, luxury details, ultra aesthetic style, premium lighting.`;

document.getElementById("result").innerText = prompt;

total++;
document.getElementById("count").innerText = "Prompts Generated: " + total;

setEmoji();
}

function randomize(){
document.querySelectorAll("select").forEach(s=>{
s.selectedIndex = Math.floor(Math.random() * s.options.length);
});
generate();
}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("result").innerText);
}

function saveFav(){
let box = document.getElementById("favorites");
let item = document.createElement("div");
item.className = "favItem";
item.innerText = document.getElementById("result").innerText;
box.prepend(item);
}

function setEmoji(){
let s = val("style");
let e = "💖";

if(s=="Luxury Diva") e="💎";
if(s=="Boss Babe") e="💼";
if(s=="Soft Princess") e="👑";
if(s=="Streetwear Icon") e="🔥";
if(s=="Glossy Glam") e="💅";
if(s=="Dark Edgy") e="🖤";

document.getElementById("emoji").innerText = e;
}
</script>

</body>
</html>
