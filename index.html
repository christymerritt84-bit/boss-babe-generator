<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator 5.0 PRO</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#ffeaf5,#fff);
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

select{
padding:12px;
border-radius:12px;
border:1px solid #eee;
}

button{
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:20px;
padding:20px;
background:#fff0f8;
border-radius:16px;
min-height:150px;
}

.side{
background:#fff0f8;
padding:20px;
border-radius:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator 5.0 PRO</h1>
<p>Luxury AI prompt studio</p>

<div class="row">

<!-- LEFT -->
<div>

<div class="row">
<select id="gender">
<option>Woman</option>
<option>Girl</option>
</select>

<select id="style">
<option>Luxury Diva</option>
<option>Soft Glam</option>
<option>Street Queen</option>
</select>

<select id="skin">
<option>Rich Tan Skin</option>
<option>Dark Skin</option>
<option>Light Skin</option>
</select>

<select id="hair">
<option>Long Black Waves</option>
<option>Blonde Hair</option>
<option>Pink Hair</option>
</select>

<select id="eyes">
<option>Huge Brown Eyes</option>
<option>Green Eyes</option>
</select>

<select id="body">
<option>Petite</option>
<option>Curvy</option>
</select>

<select id="makeup">
<option>Soft Glam</option>
<option>Full Glam</option>
</select>

<select id="pose">
<option>Standing Confidently</option>
<option>Sitting Pretty</option>
</select>

<select id="nails">
<option>French Tips</option>
<option>Long Acrylics</option>
</select>

<select id="outfit">
<option>Mini Dress</option>
<option>Luxury Outfit</option>
</select>

<select id="jewelry">
<option>Diamond Jewelry</option>
<option>Gold Jewelry</option>
</select>

<select id="background">
<option>White Background</option>
<option>Luxury Background</option>
</select>

<select id="finish">
<option>Glossy Finish</option>
<option>Cartoon Style</option>
<option>Anime Style</option>
</select>
</div>

<button onclick="generate()">✨ Generate Prompt</button>

<div id="result" class="result"></div>

</div>

<!-- RIGHT -->
<div class="side">
<h3>💖 Stats</h3>
<div id="count">Generated: 0</div>
</div>

</div>

</div>

<script>

let total = 0;

// Stripe return
const params = new URLSearchParams(window.location.search);
if(params.get('paid') === 'true'){
  localStorage.setItem("bb_pro","true");
}

let isPro = localStorage.getItem("bb_pro") === "true";

function generate(){

if(!isPro && total >= 10){
alert("Upgrade to Pro 💎");
goToCheckout();
return;
}

let text = `
${val("gender")} with ${val("skin")}, ${val("eyes")}, ${val("hair")},
${val("body")} build, ${val("makeup")} makeup,
wearing ${val("outfit")} with ${val("jewelry")},
${val("pose")}, ${val("background")},
${val("finish")}, ultra detailed, aesthetic, 4k
`;

document.getElementById("result").innerText = text;

total++;
document.getElementById("count").innerText = "Generated: " + total;
}

function val(id){
return document.getElementById(id).value;
}

function goToCheckout(){
const returnUrl = window.location.href + "?paid=true";
window.location.href = "https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00?success_url=" + encodeURIComponent(returnUrl);
}

</script>

</body>
</html>
