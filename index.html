<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>👑 Boss Babe Generator PRO</title>

<style>
body{
font-family:-apple-system, sans-serif;
background:linear-gradient(135deg,#ffe4ef,#fff);
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
margin-bottom:20px;
}

h1{
text-align:center;
color:#ff4f9a;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.tag{
padding:8px 14px;
border-radius:999px;
background:#f2f2f2;
cursor:pointer;
font-size:13px;
}

.tag.active{
background:#ff4f9a;
color:#fff;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}

.result{
margin-top:15px;
padding:15px;
border-radius:14px;
background:#fff0f8;
white-space:pre-line;
}

.lock{
background:#fff0f0;
padding:10px;
border-radius:10px;
text-align:center;
display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>👑 Boss Babe Generator</h1>
<div style="text-align:center;">Generated: <span id="count">0</span></div>

<div id="lockBox" class="lock">
💎 Upgrade for unlimited use
<button onclick="checkout()">Unlock PRO</button>
</div>
</div>

<div class="card">

<div class="tags" data-group="style">
<div class="tag">chibi</div>
<div class="tag">anime</div>
<div class="tag">realistic</div>
</div>

<div class="tags" data-group="outfit">
<div class="tag">hoodie</div>
<div class="tag">streetwear</div>
<div class="tag">designer outfit</div>
</div>

<div class="tags" data-group="pose">
<div class="tag">standing</div>
<div class="tag">walking</div>
<div class="tag">hand on hip</div>
</div>

<button onclick="generate()">✨ Generate</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

let total = 0;
let isPro = localStorage.getItem("bb_pro");

// toggle
document.querySelectorAll(".tag").forEach(tag=>{
tag.onclick=()=>tag.classList.toggle("active");
});

function get(name){
let tags=document.querySelectorAll(`[data-group="${name}"] .active`);
return [...tags].map(t=>t.innerText);
}

// 💎 SMART EXPANSIONS
function enhancePose(pose){
if(pose.includes("standing")) return "standing confidently, facing forward, full body visible, centered composition";
if(pose.includes("walking")) return "walking naturally, mid-motion, dynamic pose, cinematic movement";
if(pose.includes("hand on hip")) return "hand on hip, confident pose, fashion stance, centered framing";
return pose.join(", ");
}

function enhanceOutfit(outfit){
if(outfit.includes("hoodie")) return "oversized hoodie with soft fabric folds, trendy streetwear aesthetic";
if(outfit.includes("streetwear")) return "modern glam streetwear outfit, layered clothing, high fashion casual vibe";
if(outfit.includes("designer")) return "luxury designer outfit, high-end fashion, polished styling";
return outfit.join(", ");
}

function enhanceStyle(style){
if(style.includes("chibi")) return "signature exaggerated chibi style, large eyes, glossy finish, ultra detailed";
if(style.includes("anime")) return "anime style, vibrant colors, sharp lines, cinematic lighting";
if(style.includes("realistic")) return "ultra realistic photography, high detail skin texture, studio lighting";
return style.join(", ");
}

// 🔥 GENERATOR
function generate(){

if(!isPro && total>=5){
document.getElementById("lockBox").style.display="block";
return;
}

let style = enhanceStyle(get("style"));
let outfit = enhanceOutfit(get("outfit"));
let pose = enhancePose(get("pose"));

let prompt = `
${style},

POSE: ${pose}.

OUTFIT: ${outfit}.

ultra realistic, cinematic lighting, 4k, highly detailed, trending on instagram, viral aesthetic.
`;

document.getElementById("result").innerText = prompt;

total++;
document.getElementById("count").innerText = total;
}

// stripe
function checkout(){
window.location.href="https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00?success_url="+encodeURIComponent(window.location.href+"?paid=true");
}

</script>

</body>
</html>
