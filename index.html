<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#fff0f8,#fff);
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

h1{
color:#ff4f9a;
margin-bottom:10px;
}

.footerText{
text-align:center;
margin-top:30px;
color:#999;
font-size:13px;
}

.tabs{
display:flex;
gap:10px;
margin:20px 0;
}

.tab{
flex:1;
padding:14px;
border:none;
border-radius:20px;
background:#f3d6e6;
color:#ff4f9a;
font-weight:bold;
cursor:pointer;
}

.tab.active{
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
}

.tabContent{display:none;}
.tabContent.active{display:block;}

.section{
margin-top:12px;
}

label{
display:block;
font-weight:600;
margin-bottom:4px;
color:#ff4f9a;
font-size:14px;
}

select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
}

button{
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.result{
margin-top:15px;
padding:15px;
background:#fff0f8;
border-radius:12px;
min-height:120px;
white-space:pre-line;
}

.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator</h1>

<div class="tabs">
<button class="tab active" onclick="showTab('prompts', this)">Prompts</button>
<button class="tab" onclick="showTab('characters', this)">Characters</button>
<button class="tab" onclick="showTab('typography', this)">Typography</button>
</div>

<div class="row">

<div>

<!-- PROMPTS -->
<div id="prompts" class="tabContent active">

<div class="section">
<label>👤 Gender</label>
<select id="gender"><option>Woman</option><option>Man</option></select>
</div>

<div class="section">
<label>🎂 Age</label>
<select id="age"><option>Young adult</option><option>Teen</option><option>Adult</option></select>
</div>

<div class="section">
<label>🌍 Ethnicity</label>
<select id="ethnicity"><option>Black</option><option>Latina</option><option>White</option><option>Asian</option></select>
</div>

<div class="section">
<label>💪 Body Type</label>
<select id="body">
<option>Curvy</option>
<option>Slim</option>
<option>Petite</option>
<option>Athletic</option>
</select>
</div>

<div class="section">
<label>💇 Hair Style</label>
<select id="hair">
<option>Long straight hair</option>
<option>Curly hair</option>
<option>Messy bun</option>
<option>Space buns</option>
<option>Ponytail</option>
</select>
</div>

<div class="section">
<label>👀 Eye Color</label>
<select id="eyes">
<option>Brown eyes</option>
<option>Blue eyes</option>
<option>Hazel eyes</option>
<option>Green eyes</option>
</select>
</div>

<div class="section">
<label>😊 Facial Features</label>
<select id="face">
<option>Clear skin</option>
<option>Freckles</option>
<option>Dimples</option>
<option>Freckles and dimples</option>
</select>
</div>

<div class="section">
<label>💄 Makeup</label>
<select id="makeup">
<option>Soft glam makeup</option>
<option>Full glam makeup</option>
<option>Natural makeup</option>
<option>Glossy lips</option>
</select>
</div>

<div class="section">
<label>🎨 Style</label>
<select id="style">
<option>Luxury diva</option>
<option>Streetwear</option>
<option>Chibi style</option>
<option>Anime style</option>
<option>Bratz doll style</option>
</select>
</div>

<div class="section">
<label>👗 Outfit</label>
<select id="outfit"><option>Mini dress</option><option>Streetwear fit</option></select>
</div>

<div class="section">
<label>👟 Footwear</label>
<select id="footwear"><option>Heels</option><option>Nike sneakers</option></select>
</div>

<div class="section">
<label>💡 Lighting</label>
<select id="lighting">
<option>Golden hour lighting</option>
<option>Studio lighting</option>
<option>Neon glow</option>
</select>
</div>

<div class="section">
<label>✨ Finish</label>
<select id="finish">
<option>Glossy finish</option>
<option>Matte finish</option>
<option>Soft glow finish</option>
</select>
</div>

<button onclick="generate()">✨ Generate Prompt</button>
<div id="result" class="result"></div>

</div>

<!-- CHARACTERS -->
<div id="characters" class="tabContent">

<div class="section">
<label>🎨 Character Style</label>
<select id="charStyle">
<option>Realistic</option>
<option>Chibi</option>
<option>Anime</option>
<option>Bratz doll</option>
</select>
</div>

<div class="section">
<label>👑 Character Type</label>
<select id="charType">
<option>Boss Babe</option>
<option>Influencer</option>
<option>Model</option>
</select>
</div>

<div class="section">
<label>💪 Body Type</label>
<select id="body2">
<option>Curvy</option>
<option>Slim</option>
<option>Petite</option>
</select>
</div>

<div class="section">
<label>😊 Expression</label>
<select id="expression">
<option>Confident smirk</option>
<option>Soft smile</option>
<option>Serious face</option>
</select>
</div>

<div class="section">
<label>⚡ Energy</label>
<select id="energy">
<option>Boss energy</option>
<option>Luxury lifestyle</option>
<option>Soft feminine</option>
</select>
</div>

<button onclick="generateCharacter()">✨ Generate Character</button>

<div id="charResult" class="result"></div>

</div>

<!-- TYPOGRAPHY -->
<div id="typography" class="tabContent">
<h3>Typography coming next 💖</h3>
</div>

</div>

<div>
<h3>💎 Pro</h3>
<button onclick="goToCheckout()">Upgrade</button>
<div id="count">Generated: 0</div>
</div>

</div>

<div class="footerText">
Built for creators who want pretty tools that win.
</div>

</div>

<script>

let total=0;

function val(id){
return document.getElementById(id).value;
}

function showTab(tabId, btn){
document.querySelectorAll(".tabContent").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(tabId).classList.add("active");
btn.classList.add("active");
}

function generate(){

let style=val("style");

let quality = style.includes("Chibi") || style.includes("Anime") || style.includes("Bratz")
? "stylized illustration, vibrant colors, digital art"
: "ultra realistic, cinematic lighting, 4k";

let prompt = `A highly detailed ${val("body")} ${val("age")} ${val("ethnicity")} ${val("gender")} with ${val("hair")}, ${val("eyes")}, ${val("face")}, styled in ${style}, wearing ${val("outfit")} with ${val("footwear")}, featuring ${val("makeup")}, captured in ${val("lighting")}, ${val("finish")}, ${quality}`;

document.getElementById("result").innerText=prompt;

total++;
document.getElementById("count").innerText="Generated: "+total;
}

function generateCharacter(){

let style=val("charStyle");
let base=`A ${val("body2")} ${val("charType")} with ${val("expression")}, ${val("energy")}`;

let output="";

if(style==="Chibi"){
output=`Cute chibi character, big head small body, ${base}, vibrant kawaii style, digital illustration`;
}
else if(style==="Anime"){
output=`Anime style character, expressive eyes, detailed shading, ${base}, vibrant anime aesthetic`;
}
else if(style==="Bratz doll"){
output=`Bratz doll style character, glossy lips, dramatic makeup, ${base}, fashion doll aesthetic`;
}
else{
output=`Ultra realistic character portrait, ${base}, cinematic lighting, 4k, high detail`;
}

document.getElementById("charResult").innerText=output;
}

function goToCheckout(){
window.location.href="https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00";
}

</script>

</body>
</html>
