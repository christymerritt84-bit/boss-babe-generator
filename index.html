<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator 5.0 PRO</title>

<style>
:root{
--pink:#ff4f9a;
--pink2:#ff7ab8;
--white:#ffffff;
--text:#333;
--shadow:0 20px 45px rgba(0,0,0,.10);
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffbfdc,#ffe6f3,#fff9fc);
padding:24px;
}

.container{
max-width:1200px;
margin:auto;
background:#fff;
border-radius:24px;
padding:24px;
box-shadow:var(--shadow);
}

.heroBadges span{
background:#fff0f8;
padding:6px 12px;
border-radius:999px;
margin-right:6px;
color:var(--pink);
font-weight:bold;
}

.ctaBar{
margin-top:16px;
padding:12px;
background:#fff0f8;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,var(--pink),var(--pink2));
color:#fff;
cursor:pointer;
margin:6px 6px 6px 0;
}

.resultBox{
margin-top:16px;
padding:20px;
min-height:150px;
background:#fff0f8;
border-radius:16px;
}

.favItem{
background:#fff5fa;
padding:8px;
border-radius:8px;
margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator 5.0 PRO</h1>
<p>Luxury AI prompt studio</p>

<div class="heroBadges">
<span>💖 Free Tool</span>
<span>🔥 Viral Ready</span>
<span>💎 Pro Version</span>
</div>

<div class="ctaBar">
💎 Unlock Pro • Unlimited Use
<button onclick="goToCheckout()">Upgrade</button>
</div>

<br>

<select id="style">
<option>Luxury Diva</option>
<option>Boss Babe</option>
</select>

<select id="hair">
<option>Long Black Waves</option>
<option>Pink Ponytail</option>
</select>

<br><br>

<button onclick="generate()">✨ Generate</button>
<button onclick="randomize()">🎲 Randomize</button>
<button onclick="copy()">📋 Copy</button>
<button onclick="save()">💾 Save</button>
<button onclick="shareSite()">📱 Share</button>

<div id="result" class="resultBox">
Your prompt appears here...
</div>

<div id="count">Generated: 0</div>

<div id="favorites"></div>

</div>

<script>

let total = 0;

// detect Stripe return
const params = new URLSearchParams(window.location.search);
if(params.get('paid') === 'true'){
  localStorage.setItem("bb_pro","true");
}

// check pro status
let isPro = localStorage.getItem("bb_pro") === "true";

if(isPro){
  console.log("User is PRO 💎");
}

function generate(){

  if(!isPro && total >= 10){
    openUpgrade();
    return;
  }

  let text = `A ${val("style")} with ${val("hair")}, ultra aesthetic.`;

  document.getElementById("result").innerText = text;

  total++;
  document.getElementById("count").innerText = "Generated: " + total;
}

function val(id){
  return document.getElementById(id).value;
}

function randomize(){
  document.querySelectorAll("select").forEach(s=>{
    s.selectedIndex=Math.floor(Math.random()*s.options.length);
  });
  generate();
}

function copy(){
  navigator.clipboard.writeText(document.getElementById("result").innerText);
}

function save(){
  let text=document.getElementById("result").innerText;
  let saved=JSON.parse(localStorage.getItem("bb_favs") || "[]");
  saved.unshift(text);
  localStorage.setItem("bb_favs",JSON.stringify(saved));
  renderFavs();
}

function renderFavs(){
  let box=document.getElementById("favorites");
  box.innerHTML="";
  let saved=JSON.parse(localStorage.getItem("bb_favs") || "[]");

  saved.forEach(item=>{
    let div=document.createElement("div");
    div.className="favItem";
    div.innerText=item;
    box.appendChild(div);
  });
}

renderFavs();

function shareSite(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied 💖");
}

function goToCheckout(){
  const returnUrl = window.location.href + (window.location.search ? '&' : '?') + 'paid=true';
  window.location.href = "https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00?success_url=" + encodeURIComponent(returnUrl);
}

function openUpgrade(){
  document.getElementById("upgradeModal").style.display="flex";
}

function closeUpgrade(){
  document.getElementById("upgradeModal").style.display="none";
}

</script>

<!-- UPGRADE MODAL -->
<div id="upgradeModal" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
">

<div style="background:#fff;padding:24px;border-radius:16px;text-align:center;">

<h2 style="color:#ff4f9a;">💎 Boss Babe Pro</h2>

<p>Unlock unlimited prompts + premium features</p>

<button onclick="goToCheckout()">Upgrade Now</button>

<br><br>

<button onclick="closeUpgrade()" style="background:none;color:#999;">Close</button>

</div>
</div>

</body>
</html>
