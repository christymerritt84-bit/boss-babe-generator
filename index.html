<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#fff0f8,#fff);
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

h1{color:#ff4f9a;}

.section{margin-top:12px;}

label{
display:block;
font-weight:600;
margin-bottom:4px;
color:#ff4f9a;
font-size:14px;
}

select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
}

button{
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.result{
margin-top:15px;
padding:15px;
background:#fff0f8;
border-radius:12px;
min-height:120px;
}

.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.previewCard{
background:#fff0f8;
padding:12px;
border-radius:16px;
margin-bottom:20px;
}

.previewCard img{
width:100%;
border-radius:12px;
transition:0.3s;
}

.footerText{
text-align:center;
margin-top:30px;
color:#999;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator</h1>

<div class="row">

<!-- LEFT -->
<div>

<div class="section">
<label>🎨 Style</label>
<select id="style">
<option>Luxury diva</option>
<option>Streetwear</option>
<option>Chibi style</option>
<option>Anime style</option>
<option>Bratz doll style</option>
</select>
</div>

<div class="section">
<label>👗 Outfit</label>
<select id="outfit">
<option>Mini dress</option>
<option>Bodycon dress</option>
<option>Luxury gown</option>
<option>Streetwear fit</option>
<option>Oversized hoodie</option>
<option>Matching set</option>
</select>
</div>

<div class="section">
<label>👟 Footwear</label>
<select id="footwear">
<option>Heels</option>
<option>Stiletto heels</option>
<option>Designer sneakers</option>
<option>Chunky sneakers</option>
<option>Boots</option>
</select>
</div>

<button onclick="generate()">✨ Generate Prompt</button>

<div id="result" class="result"></div>

</div>

<!-- RIGHT -->
<div>

<div class="previewCard">
<img id="previewImg" src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
</div>

</div>

</div>

<div class="footerText">
Built for creators who want pretty tools that win.
</div>

</div>

<script>

// 🔥 FORCE IMAGE UPDATE EVERY TIME USER CHANGES ANYTHING
document.querySelectorAll("select").forEach(select=>{
select.addEventListener("change", updateImage);
});

// 🔥 FULLY WORKING PREVIEW
function updateImage(){

let style = document.getElementById("style").value;
let outfit = document.getElementById("outfit").value;

let img = document.getElementById("previewImg");

// DEFAULT
let url = "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e";

// STYLE BASED
if(style.includes("Chibi")){
url = "https://cdn.pixabay.com/photo/2023/01/04/19/32/anime-7696451_1280.png";
}
else if(style.includes("Anime")){
url = "https://cdn.pixabay.com/photo/2022/03/06/05/30/anime-7050200_1280.png";
}
else if(style.includes("Bratz")){
url = "https://cdn.pixabay.com/photo/2023/03/08/14/35/doll-7838586_1280.png";
}
else{

// REALISTIC + OUTFIT SWITCH
if(outfit.includes("hoodie") || outfit.includes("Streetwear")){
url = "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c";
}
else if(outfit.includes("gown")){
url = "https://images.unsplash.com/photo-1520975922284-9e0f3a5e54c1";
}

}

// FORCE REFRESH
img.src = url + "?t=" + new Date().getTime();
}

// PROMPT
function generate(){

let prompt = `A stylish boss babe wearing a ${document.getElementById("outfit").value} with ${document.getElementById("footwear").value}, styled in ${document.getElementById("style").value}`;

document.getElementById("result").innerText = prompt;
}

</script>

</body>
</html>
