<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Boss Babe Generator 7.5</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#ffd6ea,#fff0f8,#fff);
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

h1{color:#ff4f9a;}

.section{margin-top:20px;}

.tags{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.tag{
padding:10px 14px;
border-radius:999px;
background:#fff0f8;
cursor:pointer;
border:1px solid #ffd1e6;
}

.tag.active{
background:#ff4f9a;
color:#fff;
}

select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #eee;
margin-top:10px;
}

button{
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#ff4f9a,#ff7ab8);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.result{
margin-top:20px;
padding:20px;
background:#fff0f8;
border-radius:16px;
min-height:120px;
}

.row{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Boss Babe Generator 7.5</h1>

<div class="row">

<div>

<!-- TAGS -->
<div class="section">
<h3>✨ Style</h3>
<div class="tags">
<span class="tag">Luxury diva</span>
<span class="tag">Soft glam</span>
<span class="tag">Street queen</span>
</div>
</div>

<div class="section">
<h3>👗 Outfit</h3>
<div class="tags">
<span class="tag">Mini dress</span>
<span class="tag">Designer outfit</span>
<span class="tag">Athleisure fit</span>
</div>
</div>

<div class="section">
<h3>💡 Lighting</h3>
<div class="tags">
<span class="tag">Golden hour lighting</span>
<span class="tag">Studio lighting</span>
<span class="tag">Neon glow</span>
</div>
</div>

<!-- DROPDOWNS -->
<div class="section">
<h3>🎂 Age</h3>
<select id="age">
<option>Young adult</option>
<option>Teen</option>
<option>Adult</option>
</select>
</div>

<div class="section">
<h3>👤 Gender</h3>
<select id="gender">
<option>Woman</option>
<option>Man</option>
</select>
</div>

<div class="section">
<h3>🌍 Ethnicity</h3>
<select id="ethnicity">
<option>Black</option>
<option>Latina</option>
<option>White</option>
<option>Asian</option>
</select>
</div>

<div class="section">
<h3>💄 Makeup</h3>
<select id="makeup">
<option>Soft glam makeup</option>
<option>Full glam makeup</option>
<option>Natural makeup</option>
<option>No makeup look</option>
</select>
</div>

<div class="section">
<h3>🧍 Pose</h3>
<select id="pose">
<option>Standing confidently</option>
<option>Sitting elegantly</option>
<option>Walking forward</option>
</select>
</div>

<input id="custom" placeholder="Add extra details..." style="width:100%;padding:12px;border-radius:12px;border:1px solid #eee;margin-top:15px;">

<button onclick="generate()">✨ Generate Prompt</button>

<div id="result" class="result"></div>

</div>

<div>
<h3>💎 Pro</h3>
<button onclick="goToCheckout()">Upgrade</button>
<div id="count">Generated: 0</div>
</div>

</div>

</div>

<script>

let total=0;
let selected=[];

const params=new URLSearchParams(window.location.search);
if(params.get('paid')==='true'){
localStorage.setItem("bb_pro","true");
}

let isPro=localStorage.getItem("bb_pro")==="true";

// tag system
document.querySelectorAll(".tag").forEach(tag=>{
tag.onclick=()=>{
tag.classList.toggle("active");

if(tag.classList.contains("active")){
selected.push(tag.innerText);
}else{
selected=selected.filter(t=>t!==tag.innerText);
}
};
});

// SMART PROMPT BUILDER
function generate(){

if(!isPro && total>=10){
alert("Upgrade to Pro 💎");
goToCheckout();
return;
}

let gender=val("gender");
let age=val("age");
let ethnicity=val("ethnicity");
let makeup=val("makeup");
let pose=val("pose");
let custom=document.getElementById("custom").value;

// Build intelligent sentence
let prompt = `A highly detailed ${age} ${ethnicity} ${gender}, styled as ${selected.join(", ")}, wearing a ${selected.find(t=>t.includes("dress")||t.includes("outfit")) || "fashionable outfit"}, with ${makeup}, ${pose}, captured with ${selected.join(", ")}, ultra realistic, 4k, highly aesthetic, trending social media style`;

if(custom){
prompt += ", " + custom;
}

document.getElementById("result").innerText=prompt;

total++;
document.getElementById("count").innerText="Generated: "+total;
}

function val(id){
return document.getElementById(id).value;
}

function goToCheckout(){
const returnUrl=window.location.href+"?paid=true";
window.location.href="https://buy.stripe.com/8x23cu1UB7ENgZk8t3gbm00?success_url="+encodeURIComponent(returnUrl);
}

</script>

</body>
</html>
