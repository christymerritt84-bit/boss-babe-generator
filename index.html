<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Boss Babe Generator 💖</title>

<style>
:root{
--pink:#ff4f9a;
--pink-dark:#ff2e88;
--pink-soft:#ffdff0;
--pink-light:#fff4fa;
--pink-card:#fff6fb;
--purple:#b067ff;
--dark:#222;
--text:#333;
--muted:#777;
--white:#fff;
--border:#eee;
--radius:16px;
--shadow:0 20px 50px rgba(0,0,0,.12);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ffb6d9,var(--pink-soft),var(--pink-light));
background-size:300% 300%;
animation:bgMove 10s infinite alternate;
padding:30px;
text-align:center;
color:var(--text);
}

@keyframes bgMove{
0%{background-position:left;}
100%{background-position:right;}
}

.container{
max-width:960px;
margin:auto;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.92);
backdrop-filter:blur(8px);
box-shadow:var(--shadow);
}

h1{
font-size:42px;
color:var(--pink-dark);
margin-bottom:10px;
text-shadow:0 2px 10px rgba(255,46,136,.18);
}

.sub{
color:var(--muted);
margin-bottom:18px;
font-size:17px;
}

.preview{
font-size:95px;
margin:10px 0 20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:12px;
}

select,input,button{
width:100%;
padding:15px;
font-size:16px;
border-radius:var(--radius);
outline:none;
}

input::placeholder{
color:#555;
font-weight:500;
opacity:1;
}

select:focus,input:focus{
border-color:var(--pink);
box-shadow:0 0 0 3px rgba(255,79,154,.15);
}

button{
border:none;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(90deg,var(--pink),#ff7ab8);
transition:.2s ease;
}

button:hover{
transform:translateY(-2px);
opacity:.96;
}

.alt{
background:#ffc3dd;
color:#333;
}

.copy{
background:var(--purple);
}

.clear{
background:var(--dark);
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin:15px 0;
}

.card{
background:var(--pink-card);
padding:14px;
border-radius:18px;
font-weight:bold;
color:var(--pink);
}

#result{
margin-top:18px;
padding:24px;
min-height:170px;
text-align:left;
line-height:1.8;
font-size:18px;
border-radius:24px;
background:linear-gradient(135deg,#fff0f8,#fff8fc);
}

.footer{
margin-top:14px;
font-size:14px;
color:#888;
}

@media(max-width:700px){
body{padding:15px;}
.container{padding:20px;}
.row,.stats{grid-template-columns:1fr;}
h1{font-size:32px;}
.preview{font-size:70px;}
#result{font-size:16px;}
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Boss Babe Generator 💖</h1>
<div class="sub">Create viral, glam, detailed AI character prompts</div>

<div class="preview" id="emoji">💖</div>

<div class="row">
<select id="gender">
<option>Woman</option>
<option>Girl</option>
<option>Man</option>
<option>Boy</option>
</select>

<select id="style">
<option>Luxury Diva</option>
<option>Glossy Glam</option>
<option>Kawaii Cute</option>
<option>Streetwear Icon</option>
<option>Soft Princess</option>
<option>Dark Edgy</option>
<option>Barbie Inspired</option>
<option>Boss Babe</option>
</select>
</div>

<div class="row">
<select id="skin">
<option>Rich Tan Skin</option>
<option>Deep Brown Skin</option>
<option>Fair Glowing Skin</option>
<option>Golden Skin Tone</option>
<option>Warm Bronze Skin</option>
<option>Soft Caramel Skin</option>
</select>

<select id="hair">
<option>Long Black Waves</option>
<option>Blonde Pixie Cut</option>
<option>Pink Ponytail</option>
<option>Brown Money Piece Bob</option>
<option>Silver Straight Hair</option>
<option>Curly Red Hair</option>
<option>Waist Length Platinum Hair</option>
</select>
</div>

<div class="row">
<select id="eyes">
<option>Huge Brown Eyes</option>
<option>Sparkling Blue Eyes</option>
<option>Emerald Green Eyes</option>
<option>Glossy Hazel Eyes</option>
<option>Diamond Sparkle Eyes</option>
</select>

<select id="outfit">
<option>Sparkly Mini Dress</option>
<option>Pink Tracksuit</option>
<option>Luxury Gown</option>
<option>Crop Top and Jeans</option>
<option>Graduation Gown</option>
<option>Oversized Hoodie</option>
<option>Designer Two-Piece Set</option>
</select>
</div>

<div class="row">
<select id="pose">
<option>Crossing Arms Confidently</option>
<option>Holding Coffee Cup</option>
<option>Standing With Attitude</option>
<option>Waving Happily</option>
<option>Sitting Cute Pose</option>
<option>Hands On Hips</option>
<option>Blowing Kiss</option>
</select>

<select id="extra">
<option>Diamond Jewelry</option>
<option>Long Nails</option>
<option>Handbag</option>
<option>Angel Wings</option>
<option>Rose Bouquet</option>
<option>Butterfly Tattoos</option>
<option>Designer Sunglasses</option>
</select>
</div>

<div class="row">
<select id="bg">
<option>White Background</option>
<option>Pink Sparkly Background</option>
<option>Luxury Glam Room</option>
<option>Soft Pastel Clouds</option>
<option>City Night Lights</option>
<option>Runway Spotlight</option>
<option>Dreamy Candy World</option>
</select>

<select id="mood">
<option>Confident</option>
<option>Cute</option>
<option>Playful</option>
<option>Boss Energy</option>
<option>Sweet</option>
<option>Fierce</option>
<option>Unbothered</option>
</select>
</div>

<div class="row">
<select id="face">
<option>Full Lips</option>
<option>Button Nose</option>
<option>Freckles</option>
<option>Dimples</option>
<option>Bold Brows</option>
<option>Long Lashes</option>
<option>Sharp Jawline</option>
<option>Soft Blush Cheeks</option>
</select>

<select id="body">
<option>Petite</option>
<option>Curvy</option>
<option>Slim</option>
<option>Athletic</option>
<option>Thick</option>
<option>Tall Slim</option>
<option>Soft Hourglass</option>
</select>
</div>

<div class="row">
<input list="makeupList" id="makeup" placeholder="Choose Makeup Style">

<datalist id="makeupList">
<option value="Soft Glam">
<option value="Full Beat">
<option value="Natural Glow">
<option value="Barbie Pink Glam">
<option value="Smokey Eye">
<option value="Glossy Nude">
<option value="No Makeup Makeup">
</datalist>

<input list="nailsList" id="nails" placeholder="Choose Nail Style">

<datalist id="nailsList">
<option value="Long Pink Stilettos">
<option value="French Tips">
<option value="Diamond Nails">
<option value="Short Glossy Nails">
<option value="Chrome Nails">
<option value="Red Coffin Nails">
</datalist>
</div>

<button onclick="generate()">✨ Generate Fire Prompt</button>

<div class="row" style="margin-top:12px;">
<button class="alt" onclick="randomize()">🎲 Randomize</button>
<button class="copy" onclick="copyPrompt()">📋 Copy</button>
</div>

<div class="row">
<button class="clear" onclick="clearPrompt()">🗑 Clear</button>
<button class="alt" onclick="surpriseMe()">💥 Surprise Me</button>
</div>

<div class="stats">
<div class="card">🔥 Unlimited Combos</div>
<div class="card">💖 Viral Prompts</div>
<div class="card">✨ Glam Details</div>
</div>

<div id="result">Your fire prompt appears here...</div>

<div class="footer">Made for creators who like extra sparkle.</div>

</div>

<script>
function val(id){
return document.getElementById(id).value;
}

function generate(){
let prompt = `A ${val("style").toLowerCase()} exaggerated chibi-style ${val("gender").toLowerCase()} with ${val("skin").toLowerCase()}, ${val("eyes").toLowerCase()}, ${val("hair").toLowerCase()}, ${val("face").toLowerCase()}, wearing ${val("makeup").toLowerCase()} makeup and ${val("nails").toLowerCase()}, with a ${val("body").toLowerCase()} body type, wearing a ${val("outfit").toLowerCase()}, ${val("pose").toLowerCase()}, featuring ${val("extra").toLowerCase()}. ${val("gender")} has a ${val("mood").toLowerCase()} expression, oversized glossy eyes, tiny body proportions, polished shading, vibrant lighting, ultra detailed style, ${val("bg").toLowerCase()}.`;

document.getElementById("result").innerText = prompt;
setEmoji();
}

function randomize(){
document.querySelectorAll("select").forEach(s=>{
s.selectedIndex=Math.floor(Math.random()*s.options.length);
});
generate();
}

function surpriseMe(){
randomize();
document.getElementById("result").innerText += " Trending social media style, masterpiece quality.";
}

function copyPrompt(){
navigator.clipboard.writeText(document.getElementById("result").innerText);
document.getElementById("result").innerText="✅ Prompt Copied!";
setTimeout(generate,900);
}

function clearPrompt(){
document.getElementById("result").innerText="Your fire prompt appears here...";
}

function setEmoji(){
let s = val("style");
let e="💖";

if(s=="Luxury Diva") e="💎";
if(s=="Glossy Glam") e="💅";
if(s=="Kawaii Cute") e="🎀";
if(s=="Streetwear Icon") e="🔥";
if(s=="Soft Princess") e="👑";
if(s=="Dark Edgy") e="🖤";
if(s=="Barbie Inspired") e="🌸";
if(s=="Boss Babe") e="💼";

document.getElementById("emoji").innerText=e;
}
</script>

</body>
</html>
